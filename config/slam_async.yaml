slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # Frames (must match your TF)
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # Scan topic
    scan_topic: /scan

    # Recommended stability settings
    transform_timeout: 0.5
    tf_buffer_duration: 30.0

    # Mode
    mode: mapping
